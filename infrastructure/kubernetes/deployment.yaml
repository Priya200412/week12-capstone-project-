apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow

spec:
  replicas: 2

  selector:
    matchLabels:
      app: taskflow

  template:
    metadata:
      labels:
        app: taskflow

    spec:
      containers:
        - name: backend
          image: taskflow-backend
          ports:
            - containerPort: 8000